<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="nav-bar">
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="section-first">
        <h1>Hi, I'm [Your Name]</h1>
        <p>A web developer showcasing my work.</p>
    </section>

    <section id="about" class="section-about">
        <h2>About Me</h2>
        <p>Introduce yourself here. Mention your skills and what you enjoy working on.</p>
    </section>

    <section id="projects" class="section-projects">
        <h2>My Projects</h2>
        <div class="projects-div">
            <!-- Sample project tile -->
            <a href="[Project URL]" class="project-tile">
                <img src="[Image URL]" alt="Project Name" class="projects-images">
                <p class="projects-p">[Project Name]</p>
            </a>
            <!-- Add more project tiles here -->
        </div>
    </section>

    <section id="contact" class="section-contact">
        <h2>Get in Touch</h2>
        <p>Find me on:</p>
        <div class="contact-links">
            <a href="[GitHub URL]" target="_blank">GitHub</a>
            <a href="[LinkedIn URL]" target="_blank">LinkedIn</a>
            <a href="mailto:[Your Email]">Email</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 [Your Name]</p>
    </footer>
</body>
</html>
